spring.application.name=Aluguel de Veículos API

spring.profiles.default=dev

server.port=8080

spring.datasource.url=jdbc:h2:mem:rentaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html

spring.cache.cache-names=availableVehicles
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=60s
